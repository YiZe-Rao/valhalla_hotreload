version: '3.8'

services:
  valhalla:
    build:
      context: .
      dockerfile: Dockerfile
    image: valhalla-debug:latest
    container_name: valhalla-debug
    volumes:
      - .:/workspace
      - valhalla-build-cache:/workspace/valhalla/build
    working_dir: /workspace
    stdin_open: true
    tty: true
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    ports:
      - "8002:8002"
    command: /bin/bash

volumes:
  valhalla-build-cache:
